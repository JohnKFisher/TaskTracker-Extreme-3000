name: Release

on:
  push:
    branches: [main]
    paths:
      - version.json
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: windows
            platform: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            tauri_args: --target x86_64-pc-windows-msvc --bundles nsis
            upload_plain_binary: false

          - job_name: macos-universal
            platform: macos-14
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_args: --target universal-apple-darwin --bundles dmg
            upload_plain_binary: false

    name: ${{ matrix.job_name }}
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        shell: bash
        run: |
          marketing_version=$(node -p "require('./version.json').marketingVersion")
          echo "marketing_version=$marketing_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$marketing_version" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          current_tag="${{ steps.version.outputs.release_tag }}"
          previous_tag=$(git tag --list 'v*' --sort=-v:refname | awk -v current="$current_tag" '$0 != current { print; exit }')

          if [ -n "$previous_tag" ]; then
            range="$previous_tag..HEAD"
            heading="Changes since $previous_tag"
          else
            first_commit=$(git rev-list --max-parents=0 HEAD | tail -n 1)
            range="$first_commit..HEAD"
            heading="Changes in this release"
          fi

          notes=$(git log "$range" --no-merges --pretty=format:'- %s' \
            | grep -vE '^- Bump version to ' || true)

          if [ -z "$notes" ]; then
            notes='- Version and packaging metadata update only.'
          fi

          {
            echo "body<<EOF"
            echo "$heading"
            echo
            echo "$notes"
            echo
            echo "Assets:"
            echo "- Windows NSIS installer (setup EXE)"
            echo "- macOS universal notarized DMG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Verify checked-in version metadata
        run: node scripts/version-sync.js --check

      - name: Rust check
        run: cargo check
        working-directory: src-tauri

      - name: Validate macOS signing secrets
        if: matrix.platform == 'macos-14'
        shell: bash
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          missing=0
          for name in APPLE_APP_SPECIFIC_PASSWORD APPLE_ID APPLE_TEAM_ID MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD MACOS_CODESIGN_IDENTITY MACOS_KEYCHAIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for macOS Developer ID signing, notarization, and stapling"
              missing=1
            fi
          done
          exit "$missing"

      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos-14'
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ steps.version.outputs.release_tag }}
          releaseName: TaskTracker Extreme 3000 ${{ steps.version.outputs.release_tag }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}
          uploadPlainBinary: ${{ matrix.upload_plain_binary }}
          assetNamePattern: "TaskTracker Extreme 3000 v[version] - [platform] [arch][ext]"
