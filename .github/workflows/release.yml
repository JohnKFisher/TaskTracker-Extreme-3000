name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: windows-portable
            platform: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            tauri_args: --target x86_64-pc-windows-msvc --no-bundle
            upload_plain_binary: true

          - job_name: macos-universal
            platform: macos-14
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_args: --target universal-apple-darwin --bundles dmg
            upload_plain_binary: false

    name: ${{ matrix.job_name }}
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Verify checked-in version metadata
        run: node scripts/version-sync.js --check

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TaskTracker Extreme 3000 ${{ github.ref_name }}
          releaseBody: |
            Automated build from GitHub Actions.

            Assets:
            - Windows portable EXE
            - macOS universal DMG
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}
          uploadPlainBinary: ${{ matrix.upload_plain_binary }}
          releaseAssetNamePattern: "[name]-[version]-[platform]-[arch][ext]"
