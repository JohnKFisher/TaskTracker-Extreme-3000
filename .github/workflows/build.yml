name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: windows-portable
            platform: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            tauri_args: --target x86_64-pc-windows-msvc --no-bundle
            artifact_name: tasktracker-extreme-3000-windows-portable-exe
            artifact_path: src-tauri/target/x86_64-pc-windows-msvc/release/tasktracker-extreme-3000.exe

          - job_name: macos-universal
            platform: macos-14
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_args: --target universal-apple-darwin --bundles dmg
            artifact_name: tasktracker-extreme-3000-macos-universal-dmg
            artifact_path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

    name: ${{ matrix.job_name }}
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Verify checked-in version metadata
        run: node scripts/version-sync.js --check

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.tauri_args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 30
