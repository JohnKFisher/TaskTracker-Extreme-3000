<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quick Add</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body {
      background: transparent;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="quick-add-container">
    <input type="text" class="quick-add-input" id="quick-input" placeholder="Quick add task (Enter to save, Esc to cancel)..." autofocus />
  </div>
  <script>
    const input = document.getElementById('quick-input');
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const title = input.value.trim();
        if (title) {
          window.api.quickAddTask(title);
        } else {
          window.api.closeQuickAdd();
        }
      } else if (e.key === 'Escape') {
        window.api.closeQuickAdd();
      }
    });
  </script>
</body>
</html>
